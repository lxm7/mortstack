plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'io.sessions.chatcrypto'
version = '0.1.0'

android {
  namespace "io.sessions.chatcrypto"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
  }
  lintOptions {
    abortOnError false
  }
}

repositories {
  mavenCentral()
}

dependencies {
  // terl/lazysodium-android — JNA-wrapped libsodium prebuilt for Android ABIs.
  implementation "com.goterl:lazysodium-android:5.1.4@aar"
  implementation "net.java.dev.jna:jna:5.17.0@aar"
}
