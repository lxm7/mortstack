plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'io.sessions.chatcrypto'
version = '0.1.0'

android {
  namespace "io.sessions.chatcrypto"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
  }
  lintOptions {
    abortOnError false
  }
}

repositories {
  mavenCentral()
}

dependencies {
  // terl/lazysodium-android — JNA-wrapped libsodium prebuilt for Android ABIs.
  // 5.1.4 was never published to Maven Central despite being declared here
  // (worked from local Gradle cache pre-clean; 404s on fresh fetch). 5.2.0 is
  // the closest avail release per repo.maven.apache.org/.../lazysodium-android/.
  implementation "com.goterl:lazysodium-android:5.2.0@aar"
  implementation "net.java.dev.jna:jna:5.17.0@aar"
}
