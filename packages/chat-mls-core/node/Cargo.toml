[package]
name = "chat_mls_core_node"
version = "0.0.1"
edition = "2021"
publish = false
license = "MIT"
description = "Node.js napi-rs binding for chat_mls_core — used by Vitest acceptance harness only. Not shipped in mobile."

# cdylib so Node can dlopen the resulting .node file.
[lib]
name = "chat_mls_core_node"
crate-type = ["cdylib"]

[dependencies]
chat_mls_core = { path = ".." }
napi = { version = "2.16", default-features = false, features = ["napi6"] }
napi-derive = "2.16"

[build-dependencies]
napi-build = "2"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = "symbols"
