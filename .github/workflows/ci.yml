name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  lint-check-types-test:
    name: Lint · Check-types · Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The OpenMLS Rust core (ADR-0015) is the crypto engine. Build its napi
      # binding and run the acceptance suite unconditionally — these tests are
      # the credibility signal for the E2EE claim, so they gate every push
      # rather than only when turbo marks the package as affected.
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/chat-mls-core/node

      - name: Build & test MLS native core
        run: |
          pnpm --filter @repo/chat-mls-core build:node
          pnpm --filter @repo/chat-mls-core test

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: node_modules/.cache/turbo
          key: turbo-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ github.ref_name }}-
            turbo-${{ runner.os }}-

      - name: Determine turbo filter
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "filter=...[origin/${{ github.base_ref }}]" >> "$GITHUB_OUTPUT"
          else
            echo "filter=...[HEAD^1]" >> "$GITHUB_OUTPUT"
          fi

      - name: Lint
        run: pnpm turbo run lint --filter='${{ steps.filter.outputs.filter }}' --cache-dir=node_modules/.cache/turbo

      - name: Check types
        run: pnpm turbo run check-types --filter='${{ steps.filter.outputs.filter }}' --cache-dir=node_modules/.cache/turbo

      - name: Test
        run: pnpm turbo run test --filter='${{ steps.filter.outputs.filter }}' --cache-dir=node_modules/.cache/turbo
